services:
  - type: web
    name: study-sprint-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: STORAGE_ROOT
        value: /tmp/study-sprint
      - key: AI_PROVIDER
        value: mock
      - key: WHISPER_BACKEND
        value: openai
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: study-sprint-db
          property: connectionString

databases:
  - name: study-sprint-db
    plan: free
