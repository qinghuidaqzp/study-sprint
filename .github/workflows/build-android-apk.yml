name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: Public frontend URL loaded by the APK shell
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-android-apk.yml
      - frontend/**

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Resolve Capacitor server URL
        run: |
          set -euo pipefail
          URL="${{ github.event.inputs.server_url }}"
          if [ -z "$URL" ]; then
            URL="${{ vars.CAPACITOR_SERVER_URL }}"
          fi
          if [ -z "$URL" ]; then
            URL="https://study-sprint-1lbk.vercel.app"
          fi
          echo "CAPACITOR_SERVER_URL=$URL" >> "$GITHUB_ENV"
          echo "Using CAPACITOR_SERVER_URL=$URL"

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME:-}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ] && [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found on runner"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync Capacitor Android shell
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-sprint-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Write workflow summary
        run: |
          {
            echo "### Android APK build"
            echo "- Shell URL: $CAPACITOR_SERVER_URL"
            echo "- Artifact: study-sprint-debug-apk"
            echo "- Output path: frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          } >> "$GITHUB_STEP_SUMMARY"